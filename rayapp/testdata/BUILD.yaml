# reefy-ray intentionally has no test config — used by
# TestRunTemplateTest_SkipsTemplateWithNoTestConfig
- name: reefy-ray
  emoji: 🪸
  title: Reefy Ray
  description: The fastest Ray lives around coral reefs.
  dir: reefy-ray
  cluster_env:
    build_id: anyscaleray2370-py311
  compute_config:
    GCP: configs/gcp.yaml
    AWS: configs/aws.yaml

- name: fishy-ray
  emoji: 🐠
  title: Fishy Ray
  description: Ray that swims with the other fishes.
  dir: fishy-ray
  cluster_env:
    build_id: anyscaleray2370-py311
  compute_config:
    GCP: configs/gcp.yaml
    AWS: configs/aws.yaml
  test:
    command: pip install nbmake==1.5.5 pytest==9.0.2 && pytest --nbmake . -s -vv

- name: nully-ray
  emoji: 🪱
  title: Nully Ray
  description: Ray lives deep in the ocean.
  dir: nully-ray
  cluster_env:
    build_id: anyscaleray2370-py311
  compute_config:
    GCP: configs/gcp.yaml
    AWS: configs/aws.yaml
  test:
    command: pip install nbmake==1.5.5 pytest==9.0.2 && pytest --nbmake . -s -vv

- name: testy-ray
  emoji: 🧪
  title: Testy Ray
  description: Ray with a separate tests directory.
  dir: testy-ray
  cluster_env:
    build_id: anyscaleray2370-py311
  compute_config:
    GCP: configs/gcp.yaml
    AWS: configs/aws.yaml
  test:
    command: pytest tests/ -s -vv
    tests_path: tests/

- name: byod-ray
  emoji: 🐳
  title: BYOD Ray
  description: Ray with a custom docker image.
  dir: byod-ray
  cluster_env:
    byod:
      docker_image: us-docker.pkg.dev/anyscale/templates/template_byod:2.37.0
      ray_version: "2.37.0"
  compute_config:
    GCP: configs/gcp.yaml
    AWS: configs/aws.yaml
  test:
    command: pytest . -s -vv
