# .pre-commit-config.yaml
# See https://pre-commit.com for more information

default_install_hook_types: [pre-commit, pre-push]

repos:
  # Pre-commit hooks (fast checks, run on every commit)
  - repo: local
    hooks:
      - id: go-fmt
        name: go fmt
        entry: bash -c 'go fmt ./... && git diff --exit-code'
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-commit]

      - id: golines
        name: golines (max 100 chars)
        entry: golines --list-files --max-len=100 .
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-commit]

  # Pre-push hooks (comprehensive checks, run before push)
  - repo: local
    hooks:
      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-push]

      - id: goqualgate
        name: goqualgate all
        entry: bash -c 'go build -o /tmp/goqualgate-hook ./goqualgate/goqualgate && /tmp/goqualgate-hook all'
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-push]
